name: CI

on:
  pull_request:
  push:
    branches: [21-deploy]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build common
        run: npm run build:common

      - name: Build sdk
        run: npm run build:sdk

      - name: Typecheck backend
        run: npm run typecheck --workspace=@imprime/backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace=@imprime/frontend
